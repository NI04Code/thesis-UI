name: Build Thesis

on:
  push:
    branches: [ journal-paper ]
  pull_request:
    branches: [ journal-paper ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: docker.io/texlive/texlive:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Versions
        run: |
          latex --version
          latexmk --version

      - name: Generate PDF
        run: |
          latexmk -pdf -pdflatex="pdflatex -interaction=nonstopmode -halt-on-error" journal_paper.tex

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: journal-pdf
          path: journal_paper.pdf